name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
    paths:
      - 'src/**'
      - 'apps/backoffice/**'
      - 'apps/cpg-portal/**'
      - 'apps/store-dashboard/**'
      - 'apps/digital-wallet/**'
      - 'docs/**'
      - '.github/workflows/test-pr.yml'
  workflow_dispatch:

jobs:
  backend:
    name: Backend Lint/Test
    runs-on: ubuntu-latest
    permissions:
      contents: read
    
    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_DB: qoa_local
          POSTGRES_USER: qoa
          POSTGRES_PASSWORD: supersecret
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U qoa -d qoa_local"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

      postgres_test:
        image: postgres:18-alpine
        env:
          POSTGRES_DB: qoa_test
          POSTGRES_USER: qoa
          POSTGRES_PASSWORD: supersecret
        ports:
          - 5434:5432
        options: >-
          --health-cmd="pg_isready -U qoa -d qoa_test"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.8

      - name: Install dependencies
        run: bun install

      - name: Run database migrations
        working-directory: ./src
        env:
          DATABASE_URL: postgres://qoa:supersecret@127.0.0.1:5434/qoa_test
          POSTGRES_HOST: 127.0.0.1
          POSTGRES_PORT: 5434
          POSTGRES_DB: qoa_test
          POSTGRES_USER: qoa
          POSTGRES_PASSWORD: supersecret
        run: bun run db:migrate

      - name: Run linter
        working-directory: ./src
        run: bun run lint

      - name: Run type check
        working-directory: ./src
        run: bun run typecheck

      - name: Run tests
        working-directory: ./src
        env:
          NODE_ENV: test
          PORT: 3000
          JWT_SECRET: test-secret
          AUTH_ACCESS_TTL_SECONDS: 900
          AUTH_REFRESH_TTL_DAYS: 30
          AUTH_DEV_MODE: true
          DATABASE_URL: postgres://qoa:supersecret@127.0.0.1:5434/qoa_test
          POSTGRES_HOST: 127.0.0.1
          POSTGRES_PORT: 5434
          POSTGRES_DB: qoa_test
          POSTGRES_USER: qoa
          POSTGRES_PASSWORD: supersecret
          REDIS_HOST: 127.0.0.1
          REDIS_PORT: 6379
          REDIS_URL: redis://127.0.0.1:6379/1
        run: bun run test

  frontends:
    name: Frontends Lint
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.8

      - name: Install dependencies
        run: bun install

      - name: Lint backoffice
        working-directory: ./apps/backoffice
        run: bun run lint

      - name: Lint cpg portal
        working-directory: ./apps/cpg-portal
        run: bun run lint

      - name: Lint store dashboard
        working-directory: ./apps/store-dashboard
        run: bun run lint

      - name: Lint digital wallet
        working-directory: ./apps/digital-wallet
        run: bun run lint
