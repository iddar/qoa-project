name: Deploy Staging

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      ref:
        description: Git ref to deploy
        required: false
        default: main

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Start SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.STAGING_DEPLOY_SSH_KEY }}

      - name: Add host to known_hosts
        env:
          STAGING_HOST: ${{ secrets.STAGING_HOST }}
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H "$STAGING_HOST" >> ~/.ssh/known_hosts

      - name: Deploy requested ref to staging
        env:
          STAGING_HOST: ${{ secrets.STAGING_HOST }}
          STAGING_USER: ${{ secrets.STAGING_USER }}
          DEPLOY_REF: ${{ github.event.inputs.ref || github.sha }}
        run: |
          ssh "$STAGING_USER@$STAGING_HOST" \
            "QOA_STAGING_ROOT=/srv/qoa /srv/qoa/repo/scripts/staging/deploy-staging.sh '$DEPLOY_REF'"
