    ReminderRunRequest:
      type: object
      properties:
        limit:
          type: integer
          minimum: 1
          maximum: 500

    ReminderRunResponse:
      type: object
      properties:
        data:
          type: object
          properties:
            checked:
              type: integer
            queued:
              type: integer
            skipped:
              type: integer
