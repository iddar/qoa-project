              type: string
              format: date-time

    ReminderJob:
      type: object
      properties:
        id:
          type: string
        cardId:
          type: string
        campaignId:
          type: string
        channel:
          type: string
          enum: [whatsapp]
        status:
          type: string
          enum: [queued, processing, completed, failed, cancelled]
        scheduledFor:
          type: string
          format: date-time
        createdAt:
          type: string
          format: date-time
        processedAt:
          type: string
          format: date-time
          nullable: true
        error:
          type: string
          nullable: true

    ReminderJobListResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/ReminderJob'
        pagination:
          $ref: '#/components/schemas/Pagination'

    # ===== Reward =====
    Reward:
      type: object
      properties:
        id:
          type: string
        campaignId:
          type: string
        name:
          type: string
        description:
          type: string
          nullable: true
        imageUrl:
          type: string
          nullable: true
        cost:
          type: integer
          description: Costo en puntos/estampas
        stock:
          type: integer
          nullable: true
