              type: integer
            processed:
              type: integer
            replayed:
              type: integer
            errors:
              type: integer

    # ===== Alerts =====
    Alert:
      type: object
      properties:
        code:
          type: string
        source:
          type: string
          enum: [jobs, whatsapp, transactions]
        severity:
          type: string
          enum: [low, medium, high, critical]
        title:
          type: string
        message:
          type: string
        count:
          type: integer
        updatedAt:
          type: string
          format: date-time

    AlertListResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Alert'

    AlertNotifyRequest:
      type: object
      properties:
        recipient:
          type: string
        minSeverity:
          type: string
          enum: [high, critical]

    AlertNotifyResponse:
      type: object
      properties:
        data:
          type: object
          properties:
            sent:
              type: integer
            recipient:
              type: string
            severityFilter:
              type: string
            mocked:
              type: boolean

    # ===== WhatsApp =====
    WhatsappWebhookRequest:
      type: object
      required: [messageId, from, to]
      properties:
        provider:
          type: string
        messageId:
          type: string
        from:
          type: string
        to:
          type: string
        text:
          type: string
          nullable: true
        timestamp:
          type: string
          nullable: true
        metadata:
          type: string
          nullable: true

    WhatsappWebhookResponse:
      type: object
      properties:
        data:
          type: object
          properties:
            messageId:
              type: string
            status:
              type: string
            replayed:
              type: boolean

    WhatsappMessage:
      type: object
      properties:
        id:
          type: string
        provider:
          type: string
        messageId:
          type: string
        from:
          type: string
        to:
          type: string
        text:
          type: string
          nullable: true
        status:
          type: string
          enum: [received, processed, error, replayed]
        replayCount:
          type: integer
        receivedAt:
          type: string
          format: date-time
        processedAt:
          type: string
          format: date-time
          nullable: true

    WhatsappMessageListResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/WhatsappMessage'
        pagination:
          $ref: '#/components/schemas/Pagination'

    WhatsappMetricsResponse:
      type: object
      properties:
        data:
          type: object
          properties:
            totalReceived:
              type: integer
            processed:
              type: integer
            replayed:
              type: integer
            errors:
              type: integer

