# ==================== COMPONENTS ====================
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    apiKey:
      type: apiKey
      in: header
      name: X-API-Key

  parameters:
    limitParam:
      name: limit
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
    cursorParam:
      name: cursor
      in: query
      schema:
        type: string
      description: Cursor para paginación
    storeIdParam:
      name: storeId
      in: path
      required: true
      schema:
        type: string
    cpgIdParam:
      name: cpgId
      in: path
      required: true
      schema:
        type: string
    userIdParam:
      name: userId
      in: path
      required: true
      schema:
        type: string
    idParam:
      name: id
      in: path
      required: true
      schema:
        type: string
    campaignIdParam:
      name: campaignId
      in: path
      required: true
      schema:
        type: string
    policyIdParam:
      name: policyId
      in: path
      required: true
      schema:
        type: string
    codeSetIdParam:
      name: codeSetId
      in: path
      required: true
      schema:
        type: string
    cardIdParam:
      name: cardId
      in: path
      required: true
      schema:
        type: string
    transactionIdParam:
      name: transactionId
      in: path
      required: true
      schema:
        type: string
    rewardIdParam:
      name: rewardId
      in: path
      required: true
      schema:
        type: string
    webhookIdParam:
      name: webhookId
      in: path
      required: true
      schema:
        type: string

  responses:
    Unauthorized:
      description: No autenticado
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            error:
              code: UNAUTHORIZED
              message: Autenticación requerida
    NotFound:
      description: Recurso no encontrado
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Conflict:
      description: Conflicto
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    RateLimited:
      description: Rate limit excedido
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
      headers:
        Retry-After:
          schema:
            type: integer
    BusinessRuleViolation:
      description: Regla de negocio violada
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'

  schemas:
    # ===== Common =====
    HealthResponse:
      type: object
      properties:
        status:
          type: string
          enum: [ok]
        uptime:
          type: number
        timestamp:
          type: string
          format: date-time

    Error:
      type: object
      properties:
        error:
          type: object
          properties:
            code:
              type: string
            message:
              type: string
            details:
              type: array
              items:
                type: object
        meta:
          $ref: '#/components/schemas/Meta'

    Meta:
      type: object
      properties:
        requestId:
          type: string
        traceId:
          type: string
        timestamp:
          type: string
          format: date-time

    Pagination:
      type: object
      properties:
        hasMore:
          type: boolean
        nextCursor:
          type: string
          nullable: true

    # ===== Auth =====
    OtpResponse:
      type: object
      properties:
        data:
          type: object
          properties:
            otpId:
              type: string
            expiresAt:
              type: string
              format: date-time
            channel:
              type: string

    AuthResponse:
      type: object
      properties:
        data:
          type: object
          properties:
            accessToken:
              type: string
            refreshToken:
              type: string
            expiresIn:
              type: integer
            user:
              $ref: '#/components/schemas/User'

    RefreshResponse:
      type: object
      properties:
        data:
          type: object
          properties:
            accessToken:
              type: string
            refreshToken:
              type: string
            expiresIn:
              type: integer

    # ===== User =====
    User:
      type: object
      properties:
        id:
          type: string
        phone:
          type: string
        email:
          type: string
          nullable: true
        name:
          type: string
          nullable: true
        role:
          type: string
          enum: [consumer, customer, store_staff, store_admin, cpg_admin, qoa_support, qoa_admin]
        status:
          type: string
