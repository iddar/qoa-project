        name:
          type: string
        description:
          type: string
          nullable: true
        imageUrl:
          type: string
          nullable: true
        cost:
          type: integer
          minimum: 1
        stock:
          type: integer
          nullable: true
          minimum: 0
        status:
          type: string
          enum: [active, inactive]

