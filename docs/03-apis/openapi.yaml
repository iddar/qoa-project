openapi: 3.1.0
info:
  title: Qoa API
  description: |
    API REST para la plataforma de lealtad Qoa.

    ## Autenticación
    - **JWT**: Para usuarios autenticados (consumidores, tenderos, admins)
    - **API Key**: Para integraciones B2B

    Ver [autenticacion.md](./autenticacion.md) para flujos detallados.

    ## Errores
    Todos los errores siguen el formato estándar documentado en [errores.md](./errores.md).
  version: 1.0.0
  contact:
    name: Equipo Qoa
    email: api@qoa.app

servers:
  - url: https://api.qoa.app/v1
    description: Producción
  - url: https://api.staging.qoa.app/v1
    description: Staging

tags:
  - name: Auth
    description: Autenticación y tokens
  - name: Health
    description: Health check del servicio
  - name: Users
    description: Gestión de usuarios/consumidores
  - name: Stores
    description: Puntos de venta (PDVs)
  - name: Brands
    description: Marcas de CPGs
  - name: Products
    description: Catálogo de productos (SKUs)
  - name: Campaigns
    description: Campañas de lealtad
  - name: Cards
    description: Tarjetas de consumidores
  - name: Transactions
    description: Registro de compras
  - name: Rewards
    description: Catálogo y canje de recompensas
  - name: Reports
    description: Reportes para PDV y CPG
  - name: Alerts
    description: Alertas operativas y notificaciones
  - name: WhatsApp
    description: Ingestión y observabilidad de webhooks WhatsApp
  - name: Jobs
    description: Jobs operativos y recordatorios
  - name: Webhooks
    description: Configuración de webhooks

paths:
  # ==================== HEALTH ====================
  /health:
    get:
      tags: [Health]
      summary: Health check
      operationId: health
      responses:
        '200':
          description: Servicio saludable
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'

  # ==================== AUTH ====================
  /auth/otp/request:
    post:
      tags: [Auth]
      summary: Solicitar OTP
      description: Envía un código OTP al teléfono especificado
      operationId: requestOtp
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [phone]
              properties:
                phone:
                  type: string
                  pattern: '^\+[1-9]\d{1,14}$'
                  example: '+521234567890'
                  description: Teléfono en formato E.164
                channel:
                  type: string
                  enum: [whatsapp, sms]
                  default: whatsapp
      responses:
        '200':
          description: OTP enviado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OtpResponse'
        '429':
          $ref: '#/components/responses/RateLimited'

  /auth/otp/verify:
    post:
      tags: [Auth]
      summary: Verificar OTP
      description: Verifica el código OTP y retorna tokens de autenticación
      operationId: verifyOtp
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [otpId, code]
              properties:
                otpId:
                  type: string
                  example: 'otp_abc123'
                code:
                  type: string
                  pattern: '^\d{6}$'
                  example: '123456'
      responses:
        '200':
          description: Autenticación exitosa
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /auth/signup:
    post:
      tags: [Auth]
      summary: Signup de consumidor/customer
      operationId: signup
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [phone, password]
              properties:
                phone:
                  type: string
                  pattern: '^\+[1-9]\d{1,14}$'
                email:
                  type: string
                  format: email
                name:
                  type: string
                password:
                  type: string
                  minLength: 8
                role:
                  type: string
                  enum: [consumer, customer]
      responses:
        '200':
          description: Signup exitoso
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '409':
          $ref: '#/components/responses/Conflict'

  /auth/login:
    post:
      tags: [Auth]
      summary: Login con email/password
      operationId: login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
                  minLength: 8
      responses:
        '200':
          description: Login exitoso
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /auth/password/reset-request:
    post:
      tags: [Auth]
      summary: Solicitar reset de contraseña
      description: Envía email con token de reseteo si la cuenta existe
      operationId: requestPasswordReset
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email:
                  type: string
                  format: email
      responses:
        '200':
          description: Solicitud recibida
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      message:
                        type: string

  /auth/password/reset:
    post:
      tags: [Auth]
      summary: Confirmar reset de contraseña
      operationId: resetPassword
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [token, newPassword]
              properties:
                token:
                  type: string
                newPassword:
                  type: string
                  minLength: 8
      responses:
        '204':
          description: Contraseña actualizada

  /auth/refresh:
    post:
      tags: [Auth]
      summary: Refrescar tokens
      operationId: refreshToken
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [refreshToken]
              properties:
                refreshToken:
                  type: string
      responses:
        '200':
          description: Tokens renovados
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RefreshResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /auth/logout:
    post:
      tags: [Auth]
      summary: Cerrar sesión
      operationId: logout
      security:
        - bearerAuth: []
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                refreshToken:
                  type: string
      responses:
        '204':
          description: Sesión cerrada

  # ==================== USERS ====================
  /users/me:
    get:
      tags: [Users]
      summary: Obtener usuario actual
      operationId: getCurrentUser
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Usuario actual
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
    patch:
      tags: [Users]
      summary: Actualizar perfil
      operationId: updateCurrentUser
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                email:
                  type: string
                  format: email
      responses:
        '200':
          description: Perfil actualizado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '409':
          $ref: '#/components/responses/Conflict'

  /users:
    post:
      tags: [Users]
      summary: Crear usuario desde backoffice
      operationId: createUser
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [phone, role]
              properties:
                phone:
                  type: string
                  pattern: '^\+[1-9]\d{1,14}$'
                email:
                  type: string
                  format: email
                name:
                  type: string
                role:
                  type: string
                  enum: [consumer, customer, store_staff, store_admin, cpg_admin, qoa_support, qoa_admin]
                password:
                  type: string
                  minLength: 8
                tenantId:
                  type: string
                  format: uuid
                  description: Requerido para roles store_staff, store_admin y cpg_admin
                tenantType:
                  type: string
                  enum: [store, cpg]
                  description: Requerido para roles store_staff, store_admin y cpg_admin
      responses:
        '200':
          description: Usuario creado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserCreateResponse'
        '409':
          $ref: '#/components/responses/Conflict'

  /users/{id}/block:
    post:
      tags: [Users]
      summary: Bloquear usuario (temporal o permanente)
      operationId: blockUser
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/idParam'
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                until:
                  type: string
                  format: date-time
                reason:
                  type: string
      responses:
        '200':
          description: Usuario bloqueado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserBlockResponse'

  /users/{id}/unblock:
    post:
      tags: [Users]
      summary: Desbloquear usuario
      operationId: unblockUser
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/idParam'
      responses:
        '200':
          description: Usuario desbloqueado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserBlockResponse'

  /users/me/cards:
    get:
      tags: [Users]
      summary: Listar mis tarjetas
      description: Retorna todas las tarjetas del usuario actual (su wallet)
      operationId: getMyCards
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/limitParam'
        - $ref: '#/components/parameters/cursorParam'
      responses:
        '200':
          description: Lista de tarjetas
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CardListResponse'

  # ==================== STORES ====================
  /stores:
    get:
      tags: [Stores]
      summary: Listar tiendas
      operationId: listStores
      security:
        - bearerAuth: []
        - apiKey: []
      parameters:
        - $ref: '#/components/parameters/limitParam'
        - $ref: '#/components/parameters/cursorParam'
      responses:
        '200':
          description: Lista de tiendas
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StoreListResponse'

    post:
      tags: [Stores]
      summary: Crear tienda
      operationId: createStore
      security:
        - bearerAuth: []
        - apiKey: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StoreCreate'
      responses:
        '201':
          description: Tienda creada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StoreResponse'

  /stores/{storeId}:
    get:
      tags: [Stores]
      summary: Obtener tienda
      operationId: getStore
      security:
        - bearerAuth: []
        - apiKey: []
      parameters:
        - $ref: '#/components/parameters/storeIdParam'
      responses:
        '200':
          description: Detalle de tienda
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StoreResponse'
        '404':
          $ref: '#/components/responses/NotFound'

  /stores/{storeId}/qr:
    get:
      tags: [Stores]
      summary: Obtener payload de registro
      description: Retorna el payload que debe ser codificado en QR para registrar consumidores en esta tienda
      operationId: getStoreQr
      security:
        - bearerAuth: []
        - apiKey: []
      parameters:
        - $ref: '#/components/parameters/storeIdParam'
      responses:
        '200':
          description: Payload para QR de registro
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QrResponse'

  # ==================== BRANDS ====================
  /cpgs:
    get:
      tags: [CPGs]
      summary: Listar CPGs
      operationId: listCpgs
      security:
        - bearerAuth: []
        - apiKey: []
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [active, inactive]
        - name: q
          in: query
          schema:
            type: string
          description: Búsqueda por nombre de CPG
        - $ref: '#/components/parameters/limitParam'
        - $ref: '#/components/parameters/cursorParam'
      responses:
        '200':
          description: Lista de CPGs
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CpgListResponse'

    post:
      tags: [CPGs]
      summary: Crear CPG
      operationId: createCpg
      security:
        - bearerAuth: []
        - apiKey: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CpgCreate'
      responses:
        '201':
          description: CPG creado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CpgResponse'

  /cpgs/{id}:
    get:
      tags: [CPGs]
      summary: Obtener CPG
      operationId: getCpg
      security:
        - bearerAuth: []
        - apiKey: []
      parameters:
        - $ref: '#/components/parameters/idParam'
      responses:
        '200':
          description: Detalle de CPG
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CpgResponse'

  /brands:
    get:
      tags: [Brands]
      summary: Listar marcas
      operationId: listBrands
      security:
        - bearerAuth: []
        - apiKey: []
      parameters:
        - name: cpgId
          in: query
          schema:
            type: string
          description: Filtrar por CPG
        - name: q
          in: query
          schema:
            type: string
          description: Búsqueda por nombre de marca
        - $ref: '#/components/parameters/limitParam'
        - $ref: '#/components/parameters/cursorParam'
      responses:
        '200':
          description: Lista de marcas
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BrandListResponse'

    post:
      tags: [Brands]
      summary: Crear marca
      operationId: createBrand
      security:
        - bearerAuth: []
        - apiKey: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BrandCreate'
      responses:
        '201':
          description: Marca creada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BrandResponse'

  /brands/{id}:
    get:
      tags: [Brands]
      summary: Obtener marca
      operationId: getBrand
      security:
        - bearerAuth: []
        - apiKey: []
      parameters:
        - $ref: '#/components/parameters/idParam'
      responses:
        '200':
          description: Detalle de marca
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BrandResponse'

  # ==================== PRODUCTS ====================
  /products:
    get:
      tags: [Products]
      summary: Listar productos
      operationId: listProducts
      security:
        - bearerAuth: []
        - apiKey: []
      parameters:
        - name: cpgId
          in: query
          schema:
            type: string
          description: Filtrar por CPG
        - name: brandId
          in: query
          schema:
            type: string
          description: Filtrar por brand
        - name: status
          in: query
          schema:
            type: string
            enum: [active, inactive]
        - name: q
          in: query
          schema:
            type: string
          description: Búsqueda por nombre o SKU
        - $ref: '#/components/parameters/limitParam'
        - $ref: '#/components/parameters/cursorParam'
      responses:
        '200':
          description: Lista de productos
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductListResponse'

    post:
      tags: [Products]
      summary: Crear producto
      operationId: createProduct
      security:
        - bearerAuth: []
        - apiKey: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProductCreate'
      responses:
        '201':
          description: Producto creado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductResponse'

  /products/{id}:
    get:
      tags: [Products]
      summary: Obtener producto
      operationId: getProduct
      security:
        - bearerAuth: []
        - apiKey: []
      parameters:
        - $ref: '#/components/parameters/idParam'
      responses:
        '200':
          description: Detalle de producto
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductResponse'

  # ==================== CAMPAIGNS ====================
  /campaigns:
    get:
      tags: [Campaigns]
      summary: Listar campañas
      operationId: listCampaigns
      security:
        - bearerAuth: []
        - apiKey: []
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [draft, ready_for_review, in_review, rejected, confirmed, active, paused, ended]
        - name: cpgId
          in: query
          schema:
            type: string
        - name: enrollmentMode
          in: query
          schema:
            $ref: '#/components/schemas/CampaignEnrollmentMode'
        - $ref: '#/components/parameters/limitParam'
        - $ref: '#/components/parameters/cursorParam'
      responses:
        '200':
          description: Lista de campañas
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CampaignListResponse'

    post:
      tags: [Campaigns]
      summary: Crear campaña
      operationId: createCampaign
      security:
        - bearerAuth: []
        - apiKey: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CampaignCreate'
      responses:
        '201':
          description: Campaña creada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CampaignResponse'

  /campaigns/discover:
    get:
      tags: [Campaigns]
      summary: Descubrir campañas para wallet
      operationId: discoverCampaigns
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Lista de campañas disponibles para suscripción
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CampaignListResponse'

  /campaigns/subscriptions/me:
    get:
      tags: [Campaigns]
      summary: Listar suscripciones de campañas del usuario
      operationId: listMyCampaignSubscriptions
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Lista de suscripciones del usuario autenticado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CampaignSubscriptionListResponse'

  /campaigns/{campaignId}/subscribe:
    post:
      tags: [Campaigns]
      summary: Suscribirse a campaña
      operationId: subscribeCampaign
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/campaignIdParam'
      responses:
        '200':
          description: Suscripción registrada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CampaignSubscribeResponse'

  /campaigns/{campaignId}:
    get:
      tags: [Campaigns]
      summary: Obtener campaña
      operationId: getCampaign
      security:
        - bearerAuth: []
        - apiKey: []
      parameters:
        - $ref: '#/components/parameters/campaignIdParam'
      responses:
        '200':
          description: Detalle de campaña
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CampaignResponse'

    patch:
      tags: [Campaigns]
      summary: Actualizar campaña
      operationId: updateCampaign
      security:
        - bearerAuth: []
        - apiKey: []
      parameters:
        - $ref: '#/components/parameters/campaignIdParam'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CampaignUpdate'
      responses:
        '200':
          description: Campaña actualizada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CampaignResponse'

  /campaigns/{campaignId}/ready-for-review:
    post:
      tags: [Campaigns]
      summary: Enviar campaña a revisión
      operationId: submitCampaignForReview
      security:
        - bearerAuth: []
        - apiKey: []
      parameters:
        - $ref: '#/components/parameters/campaignIdParam'
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                reason:
                  type: string
                  description: Nota opcional del owner
      responses:
        '200':
          description: Campaña marcada como lista para revisión
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CampaignResponse'

  /campaigns/{campaignId}/review:
    post:
      tags: [Campaigns]
      summary: Revisar campaña
      operationId: reviewCampaign
      security:
        - bearerAuth: []
        - apiKey: []
      parameters:
        - $ref: '#/components/parameters/campaignIdParam'
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                approved:
                  type: boolean
                  default: true
                notes:
                  type: string
      responses:
        '200':
          description: Estado de revisión actualizado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CampaignResponse'

  /campaigns/{campaignId}/confirm:
    post:
      tags: [Campaigns]
      summary: Confirmar campaña (QC)
      operationId: confirmCampaign
      security:
        - bearerAuth: []
        - apiKey: []
      parameters:
        - $ref: '#/components/parameters/campaignIdParam'
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                notes:
                  type: string
      responses:
        '200':
          description: Campaña confirmada para activación
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CampaignResponse'

  /campaigns/{campaignId}/audit-logs:
    get:
      tags: [Campaigns]
      summary: Listar auditoría de campaña
      operationId: listCampaignAuditLogs
      security:
        - bearerAuth: []
        - apiKey: []
      parameters:
        - $ref: '#/components/parameters/campaignIdParam'
        - $ref: '#/components/parameters/limitParam'
        - $ref: '#/components/parameters/cursorParam'
      responses:
        '200':
          description: Historial de cambios de la campaña
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CampaignAuditLogListResponse'

  /campaigns/{campaignId}/policies:
    get:
      tags: [Campaigns]
      summary: Listar políticas de campaña
      operationId: listCampaignPolicies
      security:
        - bearerAuth: []
        - apiKey: []
      parameters:
        - $ref: '#/components/parameters/campaignIdParam'
      responses:
        '200':
          description: Lista de políticas activas/inactivas de la campaña
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CampaignPolicyListResponse'

    post:
      tags: [Campaigns]
      summary: Crear política de campaña
      operationId: createCampaignPolicy
      security:
        - bearerAuth: []
        - apiKey: []
      parameters:
        - $ref: '#/components/parameters/campaignIdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CampaignPolicyCreate'
      responses:
        '201':
          description: Política creada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CampaignPolicyResponse'

